<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AquaPure</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ====== NAVBAR ====== -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <img src="images/Stackly_logo.png" alt="Stackly Logo" loading="lazy">
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#services">Services</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
        <li><a href="signin.html" class="btn btn-primary">Sign In</a></li>
      </ul>
      <button class="hamburger" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
  <div class="nav-overlay"></div>

  <!-- ====== SIGN UP ====== -->
  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="logo">
          <i class="fas fa-water" style="color: var(--primary);"></i>
          AquaPure
        </a>
        <h2>Create Account</h2>
        <p>Join us and start your journey to clean water</p>
      </div>
      <form class="auth-form" id="signupForm">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <span class="input-icon"><i class="fas fa-user"></i></span>
          <input type="text" id="signupName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <span class="input-icon"><i class="fas fa-envelope"></i></span>
          <input type="email" id="signupEmail" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <span class="input-icon"><i class="fas fa-lock"></i></span>
          <input type="password" id="signupPassword" placeholder="At least 6 characters" required>
          <button type="button" class="password-toggle fas fa-eye" aria-label="Toggle password visibility"></button>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <span class="input-icon"><i class="fas fa-lock"></i></span>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
          <button type="button" class="password-toggle fas fa-eye" aria-label="Toggle password visibility"></button>
        </div>
        <div class="form-options">
          <label>
            <input type="checkbox" required> I agree to the <a href="#">Terms & Conditions</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary">
          Create Account <i class="fas fa-user-plus"></i>
        </button>
      </form>
      <div class="auth-divider">
        <span>Or sign up with</span>
      </div>
      <div class="auth-social">
        <button><i class="fab fa-google" style="color: #DB4437;"></i> Google</button>
        <button><i class="fab fa-facebook-f" style="color: #4267B2;"></i> Facebook</button>
      </div>
      <p class="auth-footer-text">
        Already have an account? <a href="signin.html">Sign In</a>
      </p>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
