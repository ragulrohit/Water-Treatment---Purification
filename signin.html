<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ====== NAVBAR ====== -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <img src="images/Stackly_logo.png" alt="Stackly Logo" loading="lazy">
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="signin.html" class="btn btn-primary active">Sign In</a></li>
      </ul>
      <button class="hamburger" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
  <div class="nav-overlay"></div>

  <!-- ====== SIGN IN ====== -->
  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="logo">
          <img src="images/Stackly_logo.png" alt="Stackly Logo" loading="lazy">
        </a>
        <h2>Welcome Back</h2>
        <p>Sign in to your account to continue</p>
      </div>
      <div class="auth-benefits">
        <div>
          <i class="fas fa-clipboard-check"></i>
          <span>Track service requests</span>
        </div>
        <div>
          <i class="fas fa-bell"></i>
          <span>Get maintenance reminders</span>
        </div>
      </div>
      <form class="auth-form" id="signinForm">
        <div class="form-group">
          <label for="signinEmail">Email Address</label>
          <div class="auth-input-wrap">
            <span class="input-icon"><i class="fas fa-envelope"></i></span>
            <input type="email" id="signinEmail" placeholder="john@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label for="signinRole">Select Role</label>
          <div class="auth-input-wrap">
            <span class="input-icon"><i class="fas fa-user-shield"></i></span>
            <select id="signinRole" required>
              <option value="">Choose role</option>
              <option value="customer">Customer</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="signinPassword">Password</label>
          <div class="auth-input-wrap">
            <span class="input-icon"><i class="fas fa-lock"></i></span>
            <input type="password" id="signinPassword" placeholder="Enter your password" required>
            <button type="button" class="password-toggle fas fa-eye" aria-label="Toggle password visibility"></button>
          </div>
        </div>
        <div class="form-options">
          <label>
            <input type="checkbox"> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary">
          Sign In <i class="fas fa-arrow-right"></i>
        </button>
      </form>
      <div class="auth-divider">
        <span>Or continue with</span>
      </div>
      <div class="auth-social">
        <button type="button"><img src="images/google-icon.svg" alt="" class="google-icon"> Google</button>
        <button type="button"><i class="fab fa-facebook facebook-icon"></i> Facebook</button>
      </div>
      <p class="auth-footer-text">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
