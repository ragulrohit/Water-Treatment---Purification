<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - AquaPure</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ====== NAVBAR ====== -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <img src="images/Stackly_logo.png" alt="Stackly Logo" loading="lazy">
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#services">Services</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
        <li><a href="signin.html" class="btn btn-primary active">Sign In</a></li>
      </ul>
      <button class="hamburger" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
  <div class="nav-overlay"></div>

  <!-- ====== SIGN IN ====== -->
  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="logo">
          <i class="fas fa-water" style="color: var(--primary);"></i>
          AquaPure
        </a>
        <h2>Welcome Back</h2>
        <p>Sign in to your account to continue</p>
      </div>
      <form class="auth-form" id="signinForm">
        <div class="form-group">
          <label for="signinEmail">Email Address</label>
          <span class="input-icon"><i class="fas fa-envelope"></i></span>
          <input type="email" id="signinEmail" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label for="signinPassword">Password</label>
          <span class="input-icon"><i class="fas fa-lock"></i></span>
          <input type="password" id="signinPassword" placeholder="Enter your password" required>
          <button type="button" class="password-toggle fas fa-eye" aria-label="Toggle password visibility"></button>
        </div>
        <div class="form-options">
          <label>
            <input type="checkbox" checked> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary">
          Sign In <i class="fas fa-arrow-right"></i>
        </button>
      </form>
      <div class="auth-divider">
        <span>Or continue with</span>
      </div>
      <div class="auth-social">
        <button><i class="fab fa-google" style="color: #DB4437;"></i> Google</button>
        <button><i class="fab fa-facebook-f" style="color: #4267B2;"></i> Facebook</button>
      </div>
      <p class="auth-footer-text">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
